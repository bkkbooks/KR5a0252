  text: 全眞集玄祕要光八
  hash: sha256:9a1f888f31a86b0da99553a0a57eb5f70861ecbba02595b303455329801c539f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0252_SJB_000-040528b, image: sjb/04/040528b.png}
body:
  text: 清菴李道純著註讀周易參同契推明火候之大本大丹妙用法乾坤大者極致之謂丹者至圓之謂大顚云還識這箇麽天地不能喻其大日月不能喻其圓聖師云本來眞性號金丹四假爲爐鍊作團是知大丹者眞性之謂也法乾坤者即效天法地也乾坤運兮五行分乾坤即身心也五行即精神魂魄意也乾坤運行而生五行即身心運動五炁具也五行順兮常道有生有滅祖師云五行順行法界火坑所謂五行運動而生萬物五常之道也五常之道屬生滅法也五行逆兮丹體長靈長存祖師云五行顚倒大地七寳所謂逆行者攢簇五行眞常之道也眞常之道常存而不壞也一自虚无兆質老子云道生一虚无自然之謂者道自虚无生一炁即人之虚化神也兩儀因一開根老子云一生二一炁判而兩儀立焉即人之立性立命故也四象不離二體邵子云二分爲四易云兩儀生四象即人之性立命故也八卦互爲祖孫易云四象生八卦所謂祖孫者乾坤生六子六子生六十四卦乾坤祖也諸卦孫也達者返窮諸己自得之也萬象生乎變動人卦變動六十四卦生焉即人之一動諸縁萬慮生也吉凶悔吝兹紛周子云吉凶悔吝生乎動者也噫吉一而已可不慎乎故知吉凶悔吝由變動而生也百姓不知日用百姓日用无非此理百姓日用而不知者爲情識之所蔽也故君子之道鮮矣聖人能究本源聖人仰觀俯察究本推源體天立極設象垂辭易之書自此作矣顧易道妙盡造化之體用易之爲書盡造化之體用也通天下之變定天下之事極廣大盡精微故曰周易遂托象於斯文易之道廣大悉備以之學佛則佛以之學仙則仙以之修齊治平則修齊治平故魏伯陽托象於丹道參同契也否泰交則陰陽或升或降否泰二卦陰陽交際之要津也泰卦三陽升當此之時宜防危否卦三陰降當此之時宜固守屯蒙作則動靜在朝在昏屯蒙乃下手之初也以年言之冬至後六日爲屯六日爲蒙以月言之初一日子至巳爲屯午至亥爲蒙以身言之天癸纔生曰屯山下出泉曰蒙坎離爲男女水火坎爲中男離爲中女坎離交則水火旣濟也平叔云取將坎位中心實點化離宫腹裏陰震兌乃龍虎魄魂震爲龍爲魂兌爲虎爲魄總而言之性情也祖師云金來歸性初乃得稱遺丹此之謂也守中則黄裳元吉守中則無過不及也退符之時至坤六五守中行下則无過不及之患故曰黄裳元吉遇亢則无位而尊亢謂乾上九亢龍有悔也進火至上九要識持盈不識持盈前功俱廢旣未慎萬物之終始旣未火候周也周而復始故曰慎萬物之終始復媾昭二炁之歸奔乾坤爲八卦之門復媾爲六十四卦之二炁往來无窮无息造化成焉月虧盈應精神之衰盛月盈虧表抽添加减之則日出没合榮衛之寒温日出没表運養調燮之法本立言以明蒙立言明蒙者鼎用乾坤藥須烏兔之類是也既得象以忘言金丹之道種種異名皆是比喻欲知其要當咀言玩味既得其要忘其言可也猶設象以指意旣得其象猶當求其意悟其言則象須捐過河須用筏到岸不須船達者惟簡惟易乾生物之道易坤成物之道簡達者推而行之易簡之理得矣迷者愈煩愈難苟或執象安爐按圖索駿愈煩愈難終身无成矣故知修眞志士讀參同契不在乎泥象執文修眞高士讀參同契者當咀味求玄必得之也執文泥象奚益者哉太極圖解无極而太極虚无自然之謂也始於无始名於无名亦无言說因說不得强名曰聖人有以示天下後世泝流求源不忘其本故立象垂辭字之曰無極而太極是謂莫知其極而極非私意揣度可知也亦非謂太極之先又有无極也太極本无極也達者但於而字上着意自然見之也釋氏所謂歷劫之先明妙本即此意也老子所謂象帝之先亦謂此也大顚云遺識這箇麽天地不能喻其大日月不能喻其明收來小者无内放開大者无外此非太極之妙乎返窮諸己无極而太極即虚化神也物之大者終有邊際惟神之大周流无方化成天地無有加焉由其妙有難量故字之曰神神也者其无極之眞乎太極動而生陽動極復靜靜而生陰靜極復動一動一靜互爲其根分陰分陽兩儀立焉者太極之變也太極未判動靜之理已存二炁肇分動靜之機始發太極動而生陽太極變動也動而復靜陽變陰也靜而生陰靜而復動陰變陽也互爲其根者陰錯陽而陽錯陰也一動一靜分陰分陽清升濁淪二炁判矣清而升者曰天濁而降者曰地天動地靜二炁運行變化之迹不可揜也老子云玄牝之門是謂天地根此謂玄牝闔闢而生天生地玄牝即陰陽動靜之機也反窮諸己則知虚化神有神則有感神感動而生炁即動而生陽也炁聚而生精即動極而靜靜而生陰也精化而有形即靜極而復動也靜炁相生性命立身心判矣炁運乎心天道所以行也精主乎身地道所以立也是知身心即兩儀也陽變陰合而生水火木金土五行順布四時行也者兩儀之變也兩者二也不言二而言兩者何也兩者配合之謂也合則有感感則變通也陽變陰合陰陽感合而生五行也天一生水地二生火天三生木地四生金天五生土此五行生數也五行運化機緘不已四時行而百物生焉以身言之身心立而精炁流行五臟生而五神具矣天一生水精藏於腎也地二生火神藏於心也天三生木魂藏於肝也地四生金魄藏於肺也天五生土意藏於脾也五行運動而四端發矣達是理者則能隨時變易以從道也五行一陰陽也陰陽一太極也太極本无極也天一天三天五陽數也地二地四陰數也故曰五行一陰陽也陽者太極之動陰者太極之靜動靜不二則返本故陰陽一太極也返本則合乎元虚故曰太極本无極也修鍊之士運炁迴遺周而復始惟神不變由其不變故運化无窮攢簇五行者神也會合陰陽者亦神也神本虚也鍊精化炁鍊炁化神鍊神遺虚謂之返本遺元遺元者復歸於无極五行之生也各一其性五行各一其性者謂五行各具一太極也五行生數各以五數加之即成數也天一生水加五地六成水也地二生火加五天七成火也天三生木加五地八成木也地四生金加五天九成金也天五生土加五地十成土也是謂五行各具五行也前文謂五行一陰一陽也陰陽一太極者言其體也此謂五行各一其性者言其用言其體則五行同一太極言其用則五行各具一太極也言其體反本遺元也言其用設施之廣也體者逆數也用者順數也逆數知其所始順數知其所終知始而不知終則不能致廣大知終而不知始則不能盡精微原其始則渾渾淪淪合乎無極推其終則生生化化運乎无窮逆順相須則始終不二顯微无間則性理融通是謂體用兼而合道也无極之眞二五之精妙合而凝元極之眞者元神之妙應也二五之精者五行之妙合也妙合而凝者作成萬有也大哉无極之眞也先天之祖太乙之根三元之母衆妙之尊上下不變古今常存天得之確然而定位地得之隤然而立形乾定位而萬物資始坤立形而萬物資生至哉二五之精也非有非無非濁非清恍恍惚惚杳杳㝠㝠妙乎无體合乎无倫天地由之而立位日月由之而運行一炁由之而融化萬物由之而生成人只知受天地之生而不知受炁於无極之眞人只知立天地之中而不知立形於二五之精无極之精而不變神不足以化炁二五之精不妙合炁不足以變形欲鍊其神必先保眞欲固其形必先保精眞精不泄炁固神靈形神俱妙與道合眞聖人之能事畢矣乾道成男坤道成女二炁交感化生萬物萬物生生而變化无窮焉者人之極也人之生也得乾道則成男得坤道則成女以卦言之乾初爻交坤成震震爲長男坤初爻交乾成巽巽爲長女乾中爻交坤成坎坎爲中男坤中爻交乾成離離爲中女乾爻交坤成艮艮爲少男坤上爻交乾成兌兌爲少女六子者乾坤之互體也六子互交六十四卦備矣六十四卦變動无窮萬物生生化化而无息也以身言之乾爲首坤爲腹天地定位也離爲目坎爲耳水火不相射也震爲足巽爲手雷風相薄也艮爲鼻兌爲口山澤通炁也此形體之八卦也若以性情言之乾坤身心也坎離精神也震兌魂魄也艮巽意炁也八卦成列神行乎其中矣有无交入内外感動諸縁萬慮自此出矣非一身之萬物乎易繫云天地絪緼萬物化醇男女媾精萬物化生正謂此也天地生成運化不息萬物生生化化而無窮也者萬物之太極也惟人也得其秀而最靈形既生矣神發知矣五炁感動善惡分而萬事出矣天位乎上地位乎下人物位乎中天地萬物父母人於萬物最靈者得其中和之正故神與道渾渾淪淪一而不離也天地設位易行乎其中即身心立而神行乎其中矣天人初不間人自以爲小何也蓋由不知其原也推其本原人之未生之先抱養於太初純純全全未嘗須臾離也人之既生炁變有形形生炁聚神發知矣本元靈覺之眞即无極之眞也五炁感動眞機妙應發於外也精感於耳謂之聽地六成水也神感於口謂之言天七成火也魂感於目謂之視地八成木也魄感於鼻謂之嗅天九成金也意感於身謂之動地十成土也眞機一發邪正分萬事自此出矣若復有人收拾身心消遣情識聚五攢三抱元守一收視返聽緘炁調息外境勿令入内境勿令出一炁歸虚潜神入寂又豈有善惡之分也至於抱二五之精含太和之液復无極之眞造虚无之域是謂返本遺元歸根復命玉蟾曰父母未生以前儘有无窮活路身心不動之後復有无極眞機其斯之謂歟聖人定之以中正仁義聖人鈎深致遠動必循理理之在乎天下莫能與之較故進修德業必先窮理窮理之要必先以中正仁義爲本故聖人定之以中正仁義立極設教也中正者不性也仁義者天性之發也貫天充地幹運樞機寂然不動體物无違曰中坦平驀直柔順大方安常主靜應物无疆曰正克己復禮普濟博施成全委曲接物无私曰仁出處語默感應隨順利己利人與物无競曰義中也者天下之大本也正也者天下之至當也仁也者天下之大公也義也者天下之至和也文言曰利者義之和也又曰利物足以和義是知仁義進修德業之要也中正者窮理盡性之要也中正仁義包羅天地揆叙萬類以之修身則身修以之治國則國治周旋四海經緯天地巨細纎洪无不具備修進君子誠能三反晝夜用志不分吾見其成道也易矣而主於靜立人極焉所謂靜者非不動若以不動爲靜土石皆可聖也通書云動無靜物也是謂動中之靜眞靜也立冬後閉塞而成冬謂靜也日月星辰運行而不息謂之不動可乎冬至日閉關示民以靜待動也是動中有靜靜中有動變化之機也靜極而動天心可見矣子曰復其見天地之心乎是知萬物之本莫貴乎靜靜而又靜神得其正理所以窮性所以盡以至於命超凡越聖老子所謂清靜爲天下正大學云定而後靜人生以靜者天性也若復有人以靜立基向平常踐履處攝動心除妄情息正炁養元精自然於寂然不動中感通於萬物也恁麽則靜亦靜動亦靜動而應物其體常靜是謂眞靜眞靜乆乆則明妙明妙而後瑩徹瑩徹而後靈通瑩徹靈通十方无礙是謂至清靜也心清靜則身清靜定矣一身清靜則多身清靜多身清靜則山河大地一切清靜一切清靜則天下將自正經云人能常清靜天地悉皆歸此之謂也古聖人云而主於靜立人極焉此聖人教人之功也非觀復知化者孰能及此故聖人與天地合其德日月合其明四時合其序鬼神合其吉凶聖人之於天下猶天之於萬物也故與天地齊德日月齊明四時合序造化合機也聖人體陰陽之運達事物之理先天也君子法則聖人奉順天時後天也先天者天理自然不我違也後天者我弗敢違乎天也文言曰先天而天弗違後天而奉天時天且弗違況於人乎況於鬼神乎君子修之吉小人悖之凶君子奉順天時正心誠意而修之故常吉小人背理違義肆情逐妄而悖之故常凶修之之要貴在順時順時之要莫若靜靜則无不克无不克則莫知其極莫知其極可以合聖合聖而後知先天之道至是復矣廣成子云无視无聽抱神而靜神將自正必靜必清无勞汝形无摇汝精汝神守形形乃長生是知靜者入聖之基也聖哉周夫子一言以蔽之主於靜其爲萬世人天之師歟故曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義立天之道曰陰與陽天之乾坤也立地之道曰柔與剛地之乾坤也立人之道曰仁與義人之乾坤也是謂三才肇形各具一天地也各具一太極也各有變化也推原其始則本同一太極也反窮諸己三才之道一身備矣立天之道曰陰與陽心之神炁也立地之道曰柔與剛身之精魄也立人之道曰仁與義意之情性也身心意定三花聚而聖功成矣原始返終故知生死之說原其始則萬物同出於一太極也反其終則萬物復歸於一太極也反窮諸己元炁乃身之始也原乎元炁先天而生後天而存周流六虚彌滿八極徹地通天透金貫石三才由之而立位聖人體之而歸根復命返性之初恍惚之中千和萬合自然成眞一切有形得之則生失之則亡卷之則藏於一毫端上放之充塞太虚之表包括萬有至大難量原其所自先乎覆載混然成眞身之元也由其始物强名曰元炁故身此身因炁而有形形變而有生生變而有死生者炁之聚萬物出於機者也死者炁之散萬物入於機者也出生入死一聚一散即太極動靜之機也動必終於靜出必終於反生必終於死故原始返終故知生死之說也惟神莫測其始莫知其終歷千萬世而不變不易无古无今不生不滅由其不變故能運化生成无休无息也神也者聖而不可知之者也達是理者靜坐而養神安寢以養炁㝠情於寂潜心於極長生乆視之道得矣大哉易也斯其至矣易之在天下无時不變无時不化生生化化而無窮者易之妙也神无方易无體通天下之變者易也盡天下之變者神也易繫云易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業太極者變化之始也兩儀者太極之變也四象者兩儀之變也八卦者四象之變也吉凶者八卦之變也六十四卦萬事萬理一切有情皆八卦之變始終不變者易也由其不變故變易无窮也原其始也一炁生萬有反其終也萬有歸一无始終不變者神也由其不變故能運化不息也散一无於萬有者神也會萬有歸一无者亦神也神也易也至矣大矣全眞集玄祕要
